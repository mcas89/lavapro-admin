<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Admin - LavaPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hidden { display: none !important; }
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Custom scrollbar for history */
        .history-scroll::-webkit-scrollbar { width: 4px; }
        .history-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .history-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen">

    <!-- Tela de Login -->
    <div id="loginScreen" class="flex flex-col items-center justify-center min-h-screen px-4 bg-white">
        <div class="w-full max-w-sm">
            <h1 class="text-3xl font-extrabold text-center text-blue-600 mb-2">LavaPro Admin</h1>
            <p class="text-center text-gray-500 mb-8">Acesso restrito</p>
            
            <form id="loginForm" class="space-y-4">
                <input type="email" id="email" placeholder="E-mail Master" required 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                <input type="password" id="password" placeholder="Senha" required 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-blue-700 active:bg-blue-800 transition">
                    Entrar
                </button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden"></p>
            </form>
        </div>
    </div>

    <!-- Painel Principal -->
    <div id="dashboardScreen" class="hidden min-h-screen flex flex-col max-w-3xl mx-auto bg-gray-50 shadow-xl border-x border-gray-200">
        
        <!-- Header -->
        <header class="bg-gradient-to-r from-blue-700 to-blue-600 text-white px-6 py-5 shadow-sm sticky top-0 z-50">
            <div class="flex justify-between items-center mb-5">
                <div class="flex items-center gap-2">
                    <i data-lucide="shield-check" class="w-6 h-6 text-blue-200"></i>
                    <h1 class="text-xl font-bold">LavaPro Admin</h1>
                </div>
                <button id="logoutBtn" class="flex items-center gap-2 text-sm font-medium bg-blue-800/50 px-3 py-1.5 rounded-lg hover:bg-blue-800 transition">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Sair
                </button>
            </div>
            
            <!-- Barra de Busca -->
            <div class="relative">
                <i data-lucide="search" class="w-5 h-5 absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Buscar cliente por nome, dono ou email..." 
                    class="w-full pl-10 pr-4 py-3 text-gray-900 bg-white rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-blue-300 transition">
            </div>
        </header>

        <main class="flex-1 overflow-y-auto pb-10">
            <div class="px-6 py-4 flex justify-between items-center bg-white border-b border-gray-200 sticky top-0 z-40">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="users" class="w-4 h-4"></i>
                    <span id="tenantCount">0 Clientes</span>
                </span>
                <button id="refreshBtn" class="flex items-center gap-1 text-blue-600 hover:text-blue-700 text-sm font-bold transition">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Atualizar
                </button>
            </div>
            
            <!-- Lista -->
            <ul id="tenantsList" class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                <li class="col-span-full p-12 text-center text-gray-500 flex flex-col items-center gap-3">
                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-blue-500"></i>
                    Buscando clientes...
                </li>
            </ul>
        </main>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
